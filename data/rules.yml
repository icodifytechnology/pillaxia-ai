version: "3.1"

rules:

- rule: Start session at conversation beginning
  conversation_start: true  
  steps:
    - action: action_session_start
  wait_for_user_input: false

- rule: Greet anytime the user Greets
  steps:
  - intent: greet
  - action: action_greet

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye 
  - action: action_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: action_iamabot

- rule: Activate medication form when user wants to add medication
  steps:
  - intent: add_medication
  - action: medication_form
  - active_loop: medication_form

- rule: Cancel medication form
  condition:
    - active_loop: medication_form
  steps:
    - intent: cancel_form
    - action: action_cancel_form

- rule: Cancel refill form
  condition:
    - active_loop: refill_form
  steps:
    - intent: cancel_form
    - action: action_cancel_form

- rule: Cancel reminder form
  condition:
    - active_loop: reminder_form
  steps:
    - intent: cancel_form
    - action: action_cancel_form

- rule: After form cancellation, listen for next user input
  steps:
  - action: action_cancel_form
  - action: action_listen
  
- rule: Submit medication form
  condition:
    - active_loop: medication_form
  steps:
  - action: medication_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: action_submit_medication_form
  - action: action_listen

- rule: Handle affirm after medication submission - start refill form
  condition:
    - slot_was_set:
      - current_step: ask_refill
  steps:
    - action: action_submit_medication_form
    - action: action_listen
    - intent: affirm
    - action: refill_form
    - active_loop: refill_form

- rule: Handle deny after medication submission - finish
  condition:
    - slot_was_set:
      - current_step: ask_refill 
  steps:
    - action: action_submit_medication_form
    - action: action_listen
    - or:
      - intent: deny
      - intent: skip
    - action: action_handle_refill_deny

- rule: Submit refill form
  condition:
    - active_loop: refill_form
  steps:
  - action: refill_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: action_submit_refill_form
  - action: action_listen

# - rule: Handle affirm after refill deny - start reminder form
#   condition:
