version: "3.1"

## Define the common interruption intents
x-interruption-intents: &interruption_intents
  - intent: greet
  - intent: goodbye
  - intent: bot_challenge
  - intent: list_medications
  - intent: medication_report
  - intent: get_health_records
  - intent: notify_medication_taken
  - intent: out_of_scope
  - intent: list_of_todays_medication
  - intent: refill_due
  - intent: next_dose_date
  - intent: medication_taken_time
  - intent: get_symptoms
  - intent: get_new_symptoms
  - intent: medication_dosage
  - intent: medication_stock_level
  - intent: check_medication_taken
  - intent: medication_adherence
  - intent: add_medication

rules:

- rule: Start session at conversation beginning
  conversation_start: true  
  steps:
    - action: action_session_start
  wait_for_user_input: false

- rule: Greet anytime the user Greets
  steps:
  - intent: greet
  - action: action_greet

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye 
  - action: action_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: action_iamabot

- rule: Activate medication form when user wants to add medication
  steps:
  - intent: add_medication
  - action: action_initialize_medication_list
  - action: medication_form
  - active_loop: medication_form

- rule: Cancel medication form
  condition:
    - active_loop: medication_form
  steps:
    - intent: cancel_form
    - action: action_cancel_form

- rule: Cancel refill form
  condition:
    - active_loop: refill_form
  steps:
    - intent: cancel_form
    - action: action_cancel_form

- rule: Cancel reminder form
  condition:
    - active_loop: reminder_form
  steps:
    - intent: cancel_form
    - action: action_cancel_form

- rule: After form cancellation, listen for next user input
  steps:
  - action: action_cancel_form
  - action: action_listen
  
- rule: Submit medication form
  condition:
    - active_loop: medication_form
  steps:
  - action: medication_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: action_submit_medication_form
  - action: action_listen

- rule: Handle affirm after medication submission - start refill form
  condition:
    - slot_was_set:
      - current_step: ask_refill
  steps:
    - action: action_submit_medication_form
    - action: action_listen
    - intent: affirm
    - action: refill_form
    - active_loop: refill_form

- rule: Handle deny after medication submission - finish
  condition:
    - slot_was_set:
      - current_step: ask_refill 
  steps:
    - action: action_submit_medication_form
    - action: action_listen
    - or:
      - intent: deny
    - action: action_handle_refill_deny

- rule: Submit refill form
  condition:
    - active_loop: refill_form
  steps:
  - action: refill_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: action_submit_refill_form
  - action: action_listen

- rule: Handle affirm after refill submission - start refill form
  condition:
    - slot_was_set:
      - current_step: ask_reminder
  steps:
    - action: action_submit_refill_form
    - action: action_listen
    - intent: affirm
    - action: reminder_form
    - active_loop: reminder_form

- rule: Handle deny after refill submission - finish
  condition:
    - slot_was_set:
      - current_step: ask_reminder 
  steps:
    - action: action_submit_refill_form
    - action: action_listen
    - or:
      - intent: deny
    - action: action_handle_reminder_deny
    - action: action_listen

- rule: Submit reminder form
  condition:
    - active_loop: reminder_form
  steps:
  - action: reminder_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: action_submit_reminder_form
  - action: action_listen
  
- rule: Handle deny after refill deny - finish
  condition:
    - slot_was_set:
      - current_step: ask_reminder
  steps:
    - or: 
      - intent: deny
    - action: action_handle_reminder_deny
    - action: action_listen

- rule: Confirm suggested medication
  condition:
    - active_loop: medication_form
    - slot_was_set:
      - pending_medication_confirmation
  steps:
    - intent: affirm
    - action: validate_medication_form

- rule: Reject suggested medication
  condition:
    - active_loop: medication_form
    - slot_was_set:
      - pending_medication_confirmation
  steps:
    - intent: deny
    - action: action_ask_medication_name

- rule: Handle affirm after refill deny 
  condition:
    - slot_was_set:
      - current_step: ask_reminder
  steps: 
    - intent: affirm
    - action: reminder_form
    - active_loop: reminder_form

- rule: After reminder deny - wait for next input
  steps:
    - action: action_handle_reminder_deny
    - action: action_listen

- rule: List Medications
  steps:
  - intent: list_medications
  - action: action_list_medications

- rule: Give medication report
  steps:
  - intent: medication_report
  - action: action_medication_report

- rule: Show health records
  steps:
  - intent: get_health_records
  - action: action_get_health_records
  
- rule: Medication taken
  steps:
  - intent: notify_medication_taken
  - action: action_medication_tracker

- rule: Custom Fallback when no form is active
  condition:
    - active_loop: null  # ← Only trigger when NO form is active
  steps: 
  - intent: out_of_scope
  - action: action_custom_fallback

- rule: Handle refill form fallback
  condition:
    - active_loop: refill_form
  steps:
    - intent: nlu_fallback
    - action: action_custom_fallback


- rule: Fallback for invalid refill_day
  condition:
  - active_loop: refill_form
  steps:
  - action: action_custom_fallback
  - action: refill_form

- rule: Handle medication form fallback
  condition:
    - active_loop: medication_form
  steps:
    - intent: nlu_fallback
    - action: action_custom_fallback

- rule: Handle reminder form fallback
  condition:
    - active_loop: reminder_form
  steps:
    - intent: nlu_fallback
    - action: action_custom_fallback

- rule: Today's medication
  steps: 
  - intent: list_of_todays_medication
  - action: action_todays_medication

- rule: Get refill period
  steps:
   - intent: refill_due
   - action: action_refill_information

- rule: Get next dose
  steps:
   - intent: next_dose_date
   - action: action_next_dose

- rule: Get medication taken time
  steps:
   - intent: medication_taken_time
   - action: action_medication_taken

- rule: Get new symptoms
  steps:
   - intent: get_new_symptoms
   - action: action_new_symptom

- rule: Get medication dosage
  steps:
   - intent: medication_dosage
   - action: action_medication_dosage

- rule: Medication left dose
  steps:
   - intent: medication_stock_level
   - action: action_stock_level

- rule: Last symptom logged
  steps: 
   - intent: get_symptoms
   - action: action_symptoms

- rule: Medication Adherence
  steps:
  - intent: medication_adherence
  - action: action_medication_adherence

- rule: Check medication taken time
  steps:
  - intent: check_medication_taken
  - action: action_check_medication

- rule: Handle affirm after form interruption - cancel the form - medication form
  condition:
    - active_loop: medication_form
    - slot_was_set:
      - form_interrupted: true
  steps:
    - action: action_handle_form_interruption
    - or:
      - intent: affirm
      - intent: cancel
    - action: action_cancel_form

- rule: Handle affirm after form interruption - cancel the form - refill form
  condition:
    - active_loop: refill_form
    - slot_was_set:
      - form_interrupted: true
  steps:
    - action: action_handle_form_interruption
    - or:
      - intent: affirm
      - intent: cancel
    - action: action_cancel_form

- rule: Handle affirm after form interruption - cancel the form - reminder form
  condition:
    - active_loop: reminder_form
    - slot_was_set:
      - form_interrupted: true
  steps:
    - action: action_handle_form_interruption
    - or:
      - intent: affirm
      - intent: cancel
    - action: action_cancel_form

- rule: Handle deny after form interruption - continue with the form - medication_form
  condition:
    - active_loop: medication_form
    - slot_was_set:
      - form_interrupted: true
  steps:
    - action: action_handle_form_interruption
    - intent: deny
    - action: medication_form
    - active_loop: medication_form

- rule: Handle deny after form interruption - continue with the form - refill_form
  condition:
    - active_loop: refill_form
    - slot_was_set:
      - form_interrupted: true
  steps:
    - action: action_handle_form_interruption
    - intent: deny
    - action: refill_form
    - active_loop: refill_form

- rule: Handle deny after form interruption - continue with the form - reminder_form
  condition:
    - active_loop: reminder_form
    - slot_was_set:
      - form_interrupted: true
  steps:
    - action: action_handle_form_interruption
    - intent: deny
    - action: reminder_form
    - active_loop: reminder_form

## FORM INTERRUPTION RULES:

- rule: Interrupt medication form
  condition:
    - active_loop: medication_form
  steps:
    - or: *interruption_intents
    - action: action_handle_form_interruption

- rule: Interrupt refill form
  condition:
    - active_loop: refill_form
  steps:
    - or: *interruption_intents
    - action: action_handle_form_interruption

- rule: Interrupt reminder form
  condition:
    - active_loop: reminder_form
  steps:
    - or: *interruption_intents
    - action: action_handle_form_interruption