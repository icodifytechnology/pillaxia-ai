version: "3.1"

rules:
- rule: Greet anytime the user Greets
  steps:
  - intent: greet
  - action: action_greet

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye 
  - action: action_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: action_iamabot

- rule: Adding medication
  steps:
  - intent: add_medication
  - action: action_add_medication

- rule: List Medications
  steps:
  - intent: list_medications
  - action: action_list_medications

- rule: give medication report
  steps:
  - intent: medication_report
  - action: action_medication_report

- rule: Show health records
  steps:
  - intent: get_health_records
  - action: action_get_health_records
  
- rule: medication taken
  steps:
  - intent: notify_medication_taken
  - action: action_medication_tracker

- rule: Custom Fallback
  steps: 
  - intent: out_of_scope
  - action: action_custom_fallback

- rule: todays medication
  steps: 
  - intent: list_of_todays_medication
  - action: action_todays_medication

# - rule: Get symptoms
#   steps:
#     - intent: number_of_times_symptom_occured
#     - action: action_symptoms_occured


- rule: get refill period
  steps:
   - intent: refill_due
   - action: action_refill_information


- rule: get next dose
  steps:
   - intent: next_dose_date
   - action: action_next_dose


- rule: get medication taken time
  steps:
   - intent: medication_taken_time
   - action: action_medication_taken


- rule: get new symptoms
  steps:
   - intent: get_new_symptoms
   - action: action_new_symptom


- rule: get medication_dosage
  steps:
   - intent: medication_dosage
   - action: action_medication_dosage


- rule: medication_left_dose
  steps:
   - intent: medication_stock_level
   - action: action_stock_level


- rule: last sympyom logged
  steps: 
   - intent: get_symptoms
   - action: action_symptoms

- rule: time of medication intake
  steps:
  - intent: medication_taken_time
  - action: action_medication_taken

- rule: Medication Adherence
  steps:
  - intent: medication_adherence
  - action: action_medication_adherence

- rule: check mediation taken time
  steps:
  - intent: check_medication_taken
  - action: action_check_medication
