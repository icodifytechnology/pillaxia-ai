version: '3.1'

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - bot_challenge
  - add_medication
  - add_reminder
  - add_refill
  - cancel_form
  - list_medications
  - medication_report
  - get_health_records
  - notify_medication_taken
  - out_of_scope
  - list_of_todays_medication
  - refill_due
  - next_dose_date
  - medication_taken_time
  - get_symptoms
  - get_new_symptoms
  - medication_dosage
  # - medication_stock_level
  - check_medication_taken
  - medication_adherence
  - provide_medication_name
  - provide_medication_type
  - provide_medication_colour
  - provide_medication_dose
  - provide_medication_instructions
  - provide_stock_level
  - provide_time_period
  - provide_per_day_frequency
  - provide_reminder_time
  - provide_alert_type
  - provide_reminder_day
  - app_closed
  
actions:
  - action_session_start
  - action_greet
  - action_goodbye
  - action_iamabot
  - action_list_medications
  - action_medication_report
  - action_get_health_records
  - action_medication_tracker
  - action_custom_fallback
  - action_todays_medication
  - action_refill_information
  - action_next_dose
  - action_medication_taken
  - action_symptoms
  - action_new_symptom
  - action_medication_dosage
  # - action_stock_level
  - action_check_medication
  - action_medication_adherence
  - action_initialize_medication_list
  - action_ask_medication_name
  - action_ask_medication_type
  - action_ask_medication_colour
  - action_ask_medication_dose
  - action_ask_medication_instructions
  - validate_medication_form
  - action_submit_medication_form
  - action_handle_refill_deny
  - action_handle_reminder_deny
  - action_ask_stock_level
  - action_ask_refill_day
  - validate_refill_form
  - action_submit_refill_form
  - validate_reminder_form
  - action_submit_reminder_form
  - action_handle_form_interruption
  - action_cancel_form
  - action_ask_frequency
  - action_ask_per_day_frequency
  - action_ask_quantity
  - action_ask_reminder_time
  - action_ask_reminder_day
  - action_ask_alert_type
  - action_handle_app_closed
  - action_get_medication_id

entities:
  - period
  - medication
  - medication_name
  - medication_type
  - medication_colour
  - medication_dosage
  - medication_instructions
  - stock_level
  - time_period
  - per_day_frequency
  - reminder_time
  - alert_type
  - reminder_day

slots:
  preferred_tone:
    type: categorical
    values: [casual, formal]
    initial_value: null
    mappings:
      - type: custom
      
  user_name:
    type: text
    initial_value: null
    influence_conversation: false
    mappings:
      - type: custom
  
  user_timezone:  
    type: text
    initial_value: null
    mappings:
      - type: custom
      
  chronic_conditions:
    type: list
    initial_value: []
    mappings:
      - type: custom
      
  habit_patterns:
    type: any
    initial_value: {}
    mappings:
      - type: custom
      
  period:
    type: categorical
    mappings:
      - type: from_entity
        entity: period
        values:
          - week
          - month
          - day
          - 3 months
          - year

  medication:
    type: text
    mappings:
      - type: from_entity
        entity: medication

  health_records_available:
    type: bool
    influence_conversation: true
    mappings:
      - type: custom

  # Medication slots 
  medication_name:
    type: text
    mappings: 
      - type: from_entity
        entity: medication_name
        conditions:
          - active_loop: medication_form
            requested_slot: medication_name
        not_intent:
          - cancel_form
          - greet
          - goodbye
  
  medication_type:
    type: text
    mappings: 
      - type: from_entity
        entity: medication_type
        conditions:
          - active_loop: medication_form
            requested_slot: medication_type
  
  medication_colour:
    type: text
    mappings: 
      - type: from_entity
        entity: medication_colour
        conditions:
          - active_loop: medication_form
            requested_slot: medication_colour

  medication_dose:
    type: text
    mappings: 
      - type: from_entity
        entity: medication_dosage
        conditions:
            - active_loop: medication_form
              requested_slot: medication_dose
  
  medication_instructions:
    type: text
    mappings: 
      - type: from_entity
        entity: medication_instructions
        conditions:
          - active_loop: medication_form
            requested_slot: medication_instructions

  # Refill slots
  medication_id:
    type: text
    mappings:
      - type: custom

  stock_level:
    type: float
    mappings: 
      - type: from_entity
        entity: stock_level
        conditions:
          - active_loop: refill_form
            requested_slot: stock_level
  
  refill_day:
    type: float
    mappings: 
      - type: from_entity
        entity: time_period
        conditions:
          - active_loop: refill_form
            requested_slot: refill_day
  
  frequency:
    type: text
    mappings: 
     - type: from_entity
       entity: time_period
       conditions:
          - active_loop: reminder_form
            requested_slot: frequency

  per_day_frequency:    
    type: text
    mappings: 
     - type: from_entity
       entity: per_day_frequency
       conditions:
          - active_loop: reminder_form
            requested_slot: per_day_frequency
  
  quantity:
    type: float
    mappings: 
     - type: from_entity
       entity: medication_dosage
       conditions:
          - active_loop: reminder_form
            requested_slot: quantity 

     - type: from_entity
       entity: stock_level
       conditions:
          - active_loop: reminder_form
            requested_slot: quantity
  
  reminder_time:
    type: list
    influence_conversation: false
    mappings: 
     - type: from_entity
       entity: reminder_time
       conditions:
          - active_loop: reminder_form
            requested_slot: reminder_time
  
  alert_type:
    type: text
    mappings: 
     - type: from_entity
       entity: alert_type
       conditions:
          - active_loop: reminder_form
            requested_slot: alert_type

  reminder_day:
    type: list
    influence_conversation: false
    mappings: 
     - type: from_entity
       entity: reminder_day
     - type: from_text
       conditions:
          - active_loop: reminder_form
            requested_slot: reminder_day

  current_step:
      type: text
      influence_conversation: true
      mappings:
        - type: custom

  form_prompt:
      type: text
      influence_conversation: true
      mappings:
        - type: custom

  pending_medication_confirmation:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  fuzzy_result:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  original_medication_input:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  medicine_list:
    type: list
    influence_conversation: true
    mappings:
      - type: custom

  form_interrupted:
    type: bool
    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom

  pending_flow_type:
    type: text
    influence_conversation: true
    mappings:
      - type: custom
  
  reminder_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
      
forms:
  medication_form:
    ignored_intents:
      - cancel_form
      
    required_slots:
      - medication_name
      - medication_type
      - medication_colour
      - medication_dose
      - medication_instructions
    
  refill_form:
    ignored_intents:
      - cancel_form
      - provide_frequency
      
    required_slots:
      - stock_level
      - refill_day
  
  reminder_form:
    ignored_intents:
      - cancel_form

    required_slots: 
      - frequency
      - per_day_frequency
      - quantity
      - reminder_time
      - alert_type
      - reminder_day

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true