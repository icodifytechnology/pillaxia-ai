version: '3.1'

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - skip
  - bot_challenge
  - add_medication
  - cancel_form
  - list_medications
  - medication_report
  - get_health_records
  - notify_medication_taken
  - out_of_scope
  - list_of_todays_medication
  - refill_due
  - next_dose_date
  - medication_taken_time
  - get_symptoms
  - get_new_symptoms
  - medication_dosage
  - medication_stock_level
  - check_medication_taken
  - medication_adherence
  - provide_medication_name
  - provide_medication_type
  - provide_medication_colour
  - provide_medication_dose
  - provide_medication_instructions
  - provide_stock_level
  - provide_refill_day
  
actions:
  - action_session_start
  - action_greet
  - action_goodbye
  - action_iamabot
  - action_list_medications
  - action_medication_report
  - action_get_health_records
  - action_medication_tracker
  - action_custom_fallback
  - action_todays_medication
  - action_refill_information
  - action_next_dose
  - action_medication_taken
  - action_symptoms
  - action_new_symptom
  - action_medication_dosage
  - action_stock_level
  - action_check_medication
  - action_medication_adherence
  - action_ask_medication_name
  - action_ask_medication_type
  - action_ask_medication_colour
  - action_ask_medication_dose
  - action_ask_medication_instructions
  - validate_medication_form
  - action_submit_medication_form
  - action_handle_refill_deny
  - action_handle_reminder_deny
  - action_ask_stock_level
  - action_ask_refill_day
  - validate_refill_form
  - action_submit_refill_form
  - validate_reminder_form
  - action_submit_reminder_form
  - action_handle_form_interruption
  - action_cancel_form

entities:
  - period
  - medication
  - medication_name
  - medication_type
  - medication_colour
  - medication_dose
  - medication_instructions
  - stock_level
  - refill_day

slots:
  preferred_tone:
    type: categorical
    values: [casual, formal]
    initial_value: null
    mappings:
      - type: custom
      
  user_name:
    type: text
    initial_value: null
    influence_conversation: false
    mappings:
      - type: custom
  
  user_timezone:  
    type: text
    initial_value: null
    mappings:
      - type: custom
      
  chronic_conditions:
    type: list
    initial_value: []
    mappings:
      - type: custom
      
  habit_patterns:
    type: any
    initial_value: {}
    mappings:
      - type: custom
      
  period:
    type: categorical
    mappings:
      - type: from_entity
        entity: period
        values:
          - week
          - month
          - day
          - 3 months
          - year

  medication:
    type: text
    mappings:
      - type: from_entity
        entity: medication

  health_records_available:
    type: bool
    influence_conversation: true
    mappings:
      - type: custom

  # Medication slots 
  medication_name:
    type: text
    mappings: 
      - type: from_text
        # entity: medication_name
        conditions:
          - active_loop: medication_form
            requested_slot: medication_name
        not_intent:
          - cancel_form
          - greet
          - goodbye
  
  medication_type:
    type: text
    mappings: 
      - type: from_entity
        entity: medication_type
        conditions:
          - active_loop: medication_form
            requested_slot: medication_type
  
  medication_colour:
    type: text
    mappings: 
      - type: from_entity
        entity: medication_colour
        conditions:
          - active_loop: medication_form
            requested_slot: medication_colour

  medication_dose:
    type: text
    mappings: 
      - type: from_entity
        entity: medication_dose
        conditions:
            - active_loop: medication_form
              requested_slot: medication_dose
  
  medication_instructions:
    type: text
    mappings: 
      - type: from_entity
        entity: medication_instructions
        conditions:
          - active_loop: medication_form
            requested_slot: medication_instructions

  # Refill slots
  user_medication_id:
    type: text
    mappings:
      - type: custom

  stock_level:
    type: float
    mappings: 
      - type: from_text
        conditions:
          - active_loop: refill_form
            requested_slot: stock_level
  
  refill_day:
    type: float
    mappings: 
      - type: from_text
        conditions:
          - active_loop: refill_form
            requested_slot: refill_day
  
  # Reminder slots
  wants_reminders:
    type: bool
    mappings:
    - type: from_intent
      intent: affirm
      value: true
    - type: from_intent
      intent: deny
      value: false
  
  frequency_type:
    type: categorical
    values: [day, week, month, year]
    mappings: 
     - type: from_text

  frequency_period:
    type: float
    mappings: 
     - type: from_text

  time_period:    
    type: categorical
    values: [once, twice, thrice]
    mappings: 
     - type: from_text
  
  quantity:
    type: float
    mappings: 
     - type: from_text   
  
  reminder_time:
    type: list
    mappings: 
     - type: from_text
  
  alert_type:
    type: categorical
    values: [alarm, voice]  
    mappings: 
     - type: from_text

  reminder_day:
    type: list
    mappings: 
     - type: from_text

  current_step:
      type: text
      influence_conversation: true
      mappings:
        - type: custom

  awaiting_reminder_confirmation:
      type: bool
      influence_conversation: true
      mappings:
        - type: custom

  interrupting_intent:
    type: text
    mappings:
    - type: custom
    influence_conversation: false
    
  interrupting_text:
    type: text
    mappings:
    - type: custom
    influence_conversation: false
    
  interruption_confirmation:
    type: any  
    mappings:
    - type: custom

forms:
  medication_form:
    ignored_intents:
      - cancel_form
      
    required_slots:
      - medication_name
      - medication_type
      - medication_colour
      - medication_dose
      - medication_instructions
    
  refill_form:
    ignored_intents:
      - cancel_form
      
    required_slots:
      - stock_level
      - refill_day
  
  reminder_form:
    required_slots: []

