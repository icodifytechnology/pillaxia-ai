version: '3.1'
intents:
- goodbye
- greet
- adding medication in medication list
- bot_challenge
- list_medications
- medication_report
- report of medication with timeframe
- notify_medication_taken
- outofScope
- list of todays medication
- refil_due
- Next_dose_date
- Medication_Taken_time
- get_symptoms
- get_new_symptoms
- medication_stock_level
- medication dosage
- Check Medication Taken
- medication_adherence

actions:
- action_greet
- action_goodbye
- action_iamabot
- action_add_medication
- action_list_medication_name
- action_medication_report
- action_medication_report_with_timeframe
- action_custom_fallback
- action_medication_tracker
- action_todays_medication
- action_refil_information
- action_next_dose
- action_medication_taken
- action_new_symptom
- action_medication_dosage
- action_stock_level
- action_symptoms
- action_check_medication
- action_medication_adherence

entities:
- period
- medication


slots:
  period:
    type: categorical
    mappings:
    - type: from_entity
      entity: period
      values:
      - today
      - week
      - month
  medication:
    type: text
    mappings:
    - type: from_entity
      entity: medication

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true