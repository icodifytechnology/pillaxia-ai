version: '3.1'

intents:
  - greet
  - goodbye
  - bot_challenge
  - add_medication
  - list_medications
  - medication_report
  - notify_medication_taken
  - out_of_scope
  - list_of_todays_medication
  - refill_due
  - next_dose_date
  - medication_taken_time
  - get_symptoms
  - get_new_symptoms
  - medication_dosage
  - medication_stock_level
  - check_medication_taken
  - medication_adherence

actions:
  - action_session_start
  - action_greet
  - action_goodbye
  - action_iamabot
  - action_add_medication
  - action_list_medications
  - action_medication_report
  - action_medication_tracker
  - action_custom_fallback
  - action_todays_medication
  - action_refill_information
  - action_next_dose
  - action_medication_taken
  - action_symptoms
  - action_new_symptom
  - action_medication_dosage
  - action_stock_level
  - action_check_medication
  - action_medication_adherence

entities:
  - period
  - medication

slots:
  preferred_tone:
    type: categorical
    values: [casual, formal]
    initial_value: null
    mappings:
      - type: custom
      
  user_name:
    type: text
    initial_value: null
    influence_conversation: false
    mappings:
      - type: custom
  
  user_timezone:  
    type: text
    initial_value: null
    mappings:
      - type: custom
      
  chronic_conditions:
    type: list
    initial_value: []
    mappings:
      - type: custom
      
  habit_patterns:
    type: any
    initial_value: {}
    mappings:
      - type: custom
      
  period:
    type: categorical
    mappings:
      - type: from_entity
        entity: period
        values:
          - week
          - month

  medication:
    type: text
    mappings:
      - type: from_entity
        entity: medication

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true